<body>

<div class="top-header">
    <div class="logo-area">
        <h2>KONKAN LNG LIMITED</h2>
        <p>IT DEPARTMENT</p>
    </div>

    <div class="date-area">
        Complaint Management System
    </div>
</div>

<nav class="navbar">
    <a href="#">Home</a>
    <a href="#">New Complaint</a>
    <a href="#">Check Status</a>
    <a href="#">Help</a>
</nav>

<div class="hero-image">
    <div class="overlay">
        <h1>Welcome to Online IT Complaint Management System</h1>
    </div>
</div>

<div class="content-wrapper">

    <div class="form-box">

        <h2>Enter Complaint Details</h2>

        <form id="complaintForm">

            <div class="row">
                <select id="category" required>
                    <option value="">Complaint Category</option>
                </select>

                <select id="system" required>
                    <option value="">System</option>
                </select>
            </div>

            <div class="row">
                <input
                    type="text"
                    id="location"
                    placeholder="Location"
                    required
                >
            </div>

            <div class="row">
                <textarea
                    id="complaint"
                    placeholder="Describe the Complaint"
                    required
                ></textarea>
            </div>

            <div class="center">
                <button type="submit">
                    Save Data
                </button>
            </div>

        </form>

        <div id="successMessage"></div>

    </div>

    <div class="status-box">

        <h2>Pending Complaints</h2>

        <div id="pendingComplaints"></div>

    </div>

</div>

</body>
